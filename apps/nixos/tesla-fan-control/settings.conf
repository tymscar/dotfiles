[global]
config_version   = 1
poll_interval_ms = 1000
log_level        = info

[watchdog]
enabled             = true
device              = /dev/watchdog
timeout_s           = 30
gpu_fail_threshold  = 3

[gpu:v100]
nvml_index   = 1
curve        = 40:15, 65:20, 75:35, 82:70, 84:100
min_fan_pct  = 15
max_fan_pct  = 100
power_limit_enabled = true
power_limit_w       = 125

[gpu:4080]
nvml_index   = 0
curve        = 40:15, 65:20, 75:35, 82:70, 84:100
min_fan_pct  = 15
max_fan_pct  = 100
power_limit_enabled = true
power_limit_w       = 125

[fan:f0]
chip          = nct6798
pwm_channel   = 3
min_rpm       = 200
max_rpm       = 5600
fan_fail_threshold = 3
spin_up_grace_s   = 4

[group:main]
gpus = v100, 4080
fans = f0

